{% extends "base.html" %}

{% block title %}AI Chat - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<style>
.chat-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    height: calc(100vh - 200px);
    display: flex;
    flex-direction: column;
}
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: var(--bg-secondary);
    border-radius: 16px;
    margin-bottom: 16px;
}
.message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    margin-bottom: 12px;
    line-height: 1.5;
}
.message.user {
    background: var(--accent);
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 4px;
}
.message.ai {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
}
.message.ai code {
    background: var(--bg-primary);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
}
.chat-input-container {
    display: flex;
    gap: 12px;
}
.chat-input {
    flex: 1;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 15px;
}
.chat-input:focus {
    outline: none;
    border-color: var(--accent);
}
.send-btn {
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    font-weight: 500;
}
.send-btn:hover {
    background: var(--accent-hover);
}
.typing {
    color: var(--text-muted);
    font-style: italic;
}
</style>

<div class="chat-container">
    <h1 style="font-size: 1.5rem; margin-bottom: 16px;">🤖 AI Assistant</h1>
    
    <div class="chat-messages" id="chat-messages">
        <div class="message ai">
            Hello! I'm your AI assistant. I can help you with:
            <br>• Answering questions
            <br>• Writing code
            <br>• Summarizing text
            <br>• Brainstorming ideas
            <br>• And much more!
        </div>
    </div>
    
    <div class="chat-input-container">
        <input type="text" class="chat-input" id="chat-input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const messages = document.getElementById('chat-messages');

function addMessage(content, isUser) {
    const div = document.createElement('div');
    div.className = 'message ' + (isUser ? 'user' : 'ai');
    div.innerHTML = content;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addTyping() {
    const div = document.createElement('div');
    div.className = 'message ai typing';
    div.id = 'typing';
    div.textContent = 'Thinking...';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    
    addMessage(msg, true);
    input.value = '';
    addTyping();
    
    // Simulate AI response
    setTimeout(() => {
        removeTyping();
        const responses = [
            "That's an interesting question! Here's what I think...",
            "I can help you with that. Let me explain...",
            "Great question! Based on my knowledge...",
            "Thanks for asking! Here's my response...",
            "I'd be happy to help! Here's what I know..."
        ];
        addMessage(responses[Math.floor(Math.random() * responses.length)]);
    }, 1500);
}
</script>
{% endblock %}
