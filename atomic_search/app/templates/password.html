{% extends "base.html" %}
{% block title %}Password Generator - {{ config.APP_NAME }}{% endblock %}
{% block content %}
<style>
.pass-container { max-width: 600px; margin: 40px auto; padding: 20px; }
.pass-card { background: var(--bg-secondary); border-radius: 16px; padding: 32px; text-align: center; margin-bottom: 24px; }
.pass-value { font-size: 24px; font-family: monospace; word-break: break-all; padding: 20px; background: var(--bg-card); border-radius: 8px; margin: 16px 0; }
.pass-form { display: flex; gap: 12px; align-items: center; }
.pass-form input { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg-primary); color: var(--text-primary); }
.pass-form button { padding: 14px 24px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; }
</style>

<div class="pass-container">
    <h1 style="text-align: center; margin-bottom: 32px;">🔐 Password Generator</h1>
    
    <form class="pass-form" action="/password" method="GET">
        <input type="number" name="length" value="{{ length }}" min="8" max="128" placeholder="Length">
        <button type="submit">Generate</button>
    </form>
    
    {% if password %}
    <div class="pass-card">
        <div class="pass-value">{{ password }}</div>
        <button onclick="navigator.clipboard.writeText('{{ password }}')" style="padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer;">📋 Copy</button>
    </div>
    {% endif %}
</div>
{% endblock %}
