version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_PATH=/data/supernova_index.db
    volumes:
      - ./data:/data
    depends_on:
      - crawler

  crawler:
    build: .
    environment:
      - DATABASE_PATH=/data/supernova_index.db
      - MAX_PAGES=100000
      - MAX_WORKERS=20
    volumes:
      - ./data:/data
    restart: unless-stopped
    command: python -m atomic_search.crawler.production_crawler

volumes:
  data:
