# Render.com deployment - Docker
services:
  - type: web
    name: atomic-search
    env: Docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_ENV
        value: production
