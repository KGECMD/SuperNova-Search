[railway]
name = "atomic-search"

[build]
builder = "RAILPACK"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "gunicorn 'atomic_search.main:app' --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"

[environment]
FLASK_ENV = "production"
FLASK_DEBUG = "false"

