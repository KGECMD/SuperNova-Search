[railway]
name = "atomic-search"
deploymentId = ""

[build]
command = "pip install -r requirements.txt"

[deploy]
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.volumes]]
name = "search-index"
mountPath = "/data"
sizeGb = 1

[deploy.startCommand]
value = "gunicorn 'atomic_search.app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"

[environment]
PORT = "8080"
FLASK_ENV = "production"
FLASK_DEBUG = "false"
