[railway]
name = "atomic-search"

[build]
builder = "NIXPACKS"
nixpacksVersion = "latest"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.startCommand]
value = "gunicorn 'atomic_search.main:app' --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"

[environment]
PORT = "8080"
FLASK_ENV = "production"
FLASK_DEBUG = "false"
